<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G-Cours – Réservation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
/* ── VARIABLES DE COULEURS INDEX ── */
:root {
  --bg: #030d1a;
  --bg-2: #071526;
  --card: rgba(255,255,255,0.04);
  --card-h: rgba(255,255,255,0.07);
  --border: rgba(255,255,255,0.07);
  --border-h: rgba(56,189,248,0.35);
  --text: #e2e8f0;
  --muted: rgba(226,232,240,0.5);
  --accent: #38bdf8;
  --grad: linear-gradient(135deg, #38bdf8, #818cf8);
  --nav-h: 70px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body { 
  font-family: 'Inter', sans-serif; 
  background-color: var(--bg); 
  color: var(--text); 
  line-height: 1.6; 
  min-height: 100vh;
}

/* ── BARRE DE NAVIGATION ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; height: var(--nav-h);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  background: rgba(3,13,26,0.85); border-bottom: 1px solid var(--border); z-index: 1000;
}
.nav-inner {
  max-width: 1200px; margin: 0 auto; padding: 0 24px; height: 100%;
  display: flex; justify-content: space-between; align-items: center;
}
.logo {
  font-size: 1.5rem; font-weight: 900; text-decoration: none;
  background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.nav-links { display: flex; list-style: none; gap: 4px; }
.nav-links a {
  color: var(--muted); text-decoration: none; font-weight: 500; font-size: .93rem;
  padding: 8px 14px; border-radius: 8px; transition: 0.2s;
}
.nav-links a:hover, .nav-links a.active { color: var(--text); background: rgba(255,255,255,0.06); }
.nav-links a.active { color: var(--accent); }

/* ── STYLE DU CONTENU ── */
.hero { text-align: center; padding: calc(var(--nav-h) + 40px) 20px 24px; }
.hero-tag { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
.hero-title { font-size: clamp(24px, 5vw, 36px); font-weight: 700; letter-spacing: -0.02em; margin-bottom: 6px; }
.hero-sub { font-size: 13px; color: var(--muted); }

.section { padding: 12px 20px 60px; max-width: 1000px; margin: 0 auto; }
.slots-caption { text-align: center; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 24px; }

.inputs-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-bottom: 28px; }
.glass-input { width: 100%; max-width: 280px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 11px 15px; font-size: 13px; color: white; font-family: inherit; outline: none; transition: all 0.2s; }
.glass-input:focus { border-color: var(--accent); background: rgba(255,255,255,0.1); }
.glass-input option { background: var(--bg-2); color: white; }

.main-layout { display: flex; flex-direction: column; gap: 20px; }
@media(min-width: 760px) { .main-layout { flex-direction: row; align-items: flex-start; } .calendar-col { flex-shrink: 0; } .slots-col { flex: 1; } }

/* CALENDAR */
.glass-calendar { width: 310px; max-width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 22px; padding: 18px; align-self: center; }
.cal-month-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.cal-month-name { font-size: 20px; font-weight: 700; }
.cal-year { font-size: 13px; color: var(--muted); margin-left: 6px; }
.cal-nav-btn { background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: white; cursor: pointer; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
.cal-nav-btn:hover { background: var(--card-h); }
.cal-grid-header { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 8px; }
.cal-grid-header span { text-align: center; font-size: 10px; font-weight: 700; color: var(--muted); padding: 4px 0; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
.cal-day-btn, .admin-day-btn { width: 34px; height: 34px; border-radius: 50%; border: none; background: none; color: white; font-size: 12px; font-weight: 500; cursor: pointer; transition: 0.15s; font-family: inherit; position: relative; }
.cal-day-btn.selected, .admin-day-btn.selected { background: var(--grad); box-shadow: 0 4px 12px rgba(56,189,248,0.3); font-weight: 700; }
.cal-day-btn.today, .admin-day-btn.today { border: 1.5px solid var(--accent); }
.cal-day-btn.disabled, .admin-day-btn.disabled { color: rgba(255,255,255,0.15); cursor: default; }

/* SLOTS */
.date-header { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 13px 16px; margin-bottom: 12px; }
.date-header-label { font-size: 10px; font-weight: 600; text-transform: uppercase; color: var(--muted); }
.slot-card { display: flex; align-items: center; justify-content: space-between; gap: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 13px 16px; margin-bottom: 10px; transition: 0.2s; }
.slot-card:hover:not(.full) { border-color: var(--accent); }
.progress-bar { height: 3px; width: 100%; background: rgba(255,255,255,0.1); border-radius: 9999px; overflow: hidden; margin-top: 7px; }
.progress-fill { height: 100%; border-radius: 9999px; background: var(--grad); transition: width 0.4s; }
.reserve-btn { background: var(--grad); border: none; border-radius: 9999px; padding: 8px 16px; font-size: 12px; font-weight: 700; color: white; cursor: pointer; box-shadow: 0 4px 14px rgba(56,189,248,0.2); transition: 0.2s; }
.reserve-btn:disabled { background: var(--card); box-shadow: none; opacity: 0.5; }

/* ADMIN */
.admin-panel { margin-top: 28px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 24px; padding: 24px; }
.admin-header { margin-bottom: 20px; }
.admin-title { font-size: 18px; font-weight: 800; color: var(--accent); }
.admin-layout { display: flex; flex-direction: column; gap: 20px; }
@media(min-width: 700px) { .admin-layout { flex-direction: row; align-items: flex-start; } }
.admin-glass-cal { width: 290px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 18px; padding: 16px; }
.admin-day-btn.has-students::after { content: ''; position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; border-radius: 50%; background: #34d399; }
.admin-slot-block { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 10px; }
.admin-slot-title { font-weight: 700; font-size: 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
.admin-slot-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: rgba(255,255,255,0.1); }
.admin-slot-badge.has-p { background: rgba(52,211,153,0.15); color: #34d399; }
.student-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
.remove-btn { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.2); color: #fca5a5; cursor: pointer; font-size: 11px; padding: 3px 8px; border-radius: 6px; }

.loading-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; gap: 14px; }
.spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="logo">G-Cours</a>
    <ul class="nav-links">
      <li><a href="index.html">Accueil</a></li>
      <li><a href="reservation.html" class="active">Réservation</a></li>
      <li><a href="a-propos.html">À propos</a></li>
      <li><a href="Tarifs.html">Tarifs</a></li>
      <li><a href="qcm.html">QCM</a></li>
    </ul>
  </div>
</nav>

<div id="loadingOverlay" class="loading-overlay">
  <div class="spinner"></div>
</div>

<div class="hero">
  <p class="hero-tag">Cours particuliers · G-Cours</p>
  <h1 class="hero-title">Réservation de cours</h1>
  <p class="hero-sub">Choisissez votre créneau et réservez en ligne</p>
</div>

<div class="section">
  <p class="slots-caption">7 places maximum par créneau</p>

  <div class="inputs-row">
    <input id="nameInput" class="glass-input" type="text" placeholder="Prénom et nom de l'élève" />
    <select id="subjectSelect" class="glass-input">
      <option value="">Choisir la matière</option>
      <option value="Maths">Maths</option>
      <option value="Anglais">Anglais</option>
      <option value="Physique">Physique</option>
    </select>
  </div>

  <div class="main-layout">
    <div class="calendar-col">
      <div class="glass-calendar">
        <div class="cal-month-row">
          <div><span class="cal-month-name" id="calMonthName"></span><span class="cal-year" id="calYear"></span></div>
          <div class="cal-nav">
            <button class="cal-nav-btn" id="prevMonth">&#8249;</button>
            <button class="cal-nav-btn" id="nextMonth">&#8250;</button>
          </div>
        </div>
        <div class="cal-grid-header" id="calGridHeader"></div>
        <div class="cal-grid" id="calGrid"></div>
      </div>
    </div>
    <div class="slots-col">
      <div class="date-header">
        <p class="date-header-label">Créneaux</p>
        <p class="date-header-value" id="dateLabel"></p>
      </div>
      <div id="slotsContainer"></div>
      <div id="messageBox" style="display:none"></div>
    </div>
  </div>

  <button class="admin-btn" style="display: block; margin: 32px auto 0; background: var(--card); border: 1px solid var(--border); border-radius: 9999px; padding: 7px 20px; font-size: 12px; color: var(--muted); cursor: pointer;" id="adminBtn">Accès Prof</button>
  <div id="adminPanel" style="display:none"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCDJRbeW9KWrLzuI3v2kBUDulKcb3REKy8",
  authDomain: "reservation-cour.firebaseapp.com",
  databaseURL: "https://reservation-cour-default-rtdb.firebaseio.com",
  projectId: "reservation-cour",
  storageBucket: "reservation-cour.firebasestorage.app",
  messagingSenderId: "156100724990",
  appId: "1:156100724990:web:c77c49e487d1d519a5fdaf"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const slotsRef = db.ref("slots");

const FR_MONTHS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const FR_MONTHS_LONG = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
const FR_DAYS_LONG = ['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];

const DAY_SLOTS = {
  0: [{label:'9h00 – 11h00', key:'Dimanche_9-11'}, {label:'11h00 – 13h00', key:'Dimanche_11-13'}],
  1: [{label:'17h00 – 19h00', key:'Lundi_17-19'}, {label:'19h00 – 21h00', key:'Lundi_19-21'}],
  2: [{label:'17h00 – 19h00', key:'Mardi_17-19'}, {label:'19h00 – 21h00', key:'Mardi_19-21'}],
  3: [{label:'14h00 – 16h00', key:'Mercredi_14-16'}, {label:'16h00 – 17h00', key:'Mercredi_16-17'}],
  4: [{label:'17h00 – 19h00', key:'Jeudi_17-19'}, {label:'19h00 – 21h00', key:'Jeudi_19-21'}],
};
const COURSE_DAYS = new Set([0,1,2,3,4]);
const ALL_SLOT_KEYS = ['Dimanche_9-11','Dimanche_11-13','Lundi_17-19','Lundi_19-21','Mardi_17-19','Mardi_19-21','Mercredi_14-16','Mercredi_16-17','Jeudi_17-19','Jeudi_19-21'];
const MAX = 7;
const ADMIN_PASSWORD = atob('MjgwNQ==');

let data = {};
ALL_SLOT_KEYS.forEach(k => data[k] = []);
let today = new Date(); today.setHours(0,0,0,0);
let selectedDate = new Date(today);
let currentMonth = new Date(today.getFullYear(), today.getMonth(), 1);
let isAdmin = false;
let bookingSlot = null;
let adminSelectedDate = new Date(today);
let adminCurrentMonth = new Date(today.getFullYear(), today.getMonth(), 1);

slotsRef.on('value', (snapshot) => {
  const raw = snapshot.val() || {};
  ALL_SLOT_KEYS.forEach(k => {
    const val = raw[k];
    if (!val) data[k] = [];
    else if (Array.isArray(val)) data[k] = val.filter(Boolean);
    else data[k] = Object.values(val).filter(Boolean);
  });
  document.getElementById('loadingOverlay').style.display = 'none';
  renderCalendar();
  renderSlots();
  if (isAdmin) { renderAdminCal(); renderAdminDetail(); }
});

function sameDay(a,b){ return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }
function formatDateFR(d){ return `${FR_DAYS_LONG[d.getDay()]} ${d.getDate()} ${FR_MONTHS_LONG[d.getMonth()]} ${d.getFullYear()}`; }
function dayHasStudents(date){
  const slots = DAY_SLOTS[date.getDay()] || [];
  return slots.some(({key}) => (data[key]||[]).length > 0);
}

function buildCalGrid(gridEl, headerEl, year, month, selectedD, onDayClick, opts={}) {
  headerEl.innerHTML = '';
  ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'].forEach(d => {
    const s = document.createElement('span'); s.textContent = d; headerEl.appendChild(s);
  });
  gridEl.innerHTML = '';
  const firstDay = new Date(year, month, 1);
  const startOffset = (firstDay.getDay() + 6) % 7;
  const daysInMonth = new Date(year, month+1, 0).getDate();
  for(let i=0;i<startOffset;i++){gridEl.appendChild(document.createElement('div'));}
  for(let d=1;d<=daysInMonth;d++){
    const date = new Date(year, month, d);
    const dow = date.getDay();
    const isPast = date < today;
    const isToday = sameDay(date, today);
    const isSel = sameDay(date, selectedD);
    const hasCourse = COURSE_DAYS.has(dow);
    const hasStudents = opts.showDots && dayHasStudents(date);
    const btn = document.createElement('button');
    btn.className = (opts.admin ? 'admin-day-btn' : 'cal-day-btn');
    if(isSel) btn.classList.add('selected');
    if(isToday) btn.classList.add('today');
    if(!hasCourse || (!opts.admin && isPast)) {
        btn.classList.add('disabled');
        btn.disabled = true;
    }
    if(hasStudents) btn.classList.add('has-students');
    btn.textContent = d;
    btn.onclick = () => onDayClick(new Date(year, month, d));
    gridEl.appendChild(btn);
  }
}

function renderCalendar() {
  const year = currentMonth.getFullYear(), month = currentMonth.getMonth();
  document.getElementById('calMonthName').textContent = FR_MONTHS[month];
  document.getElementById('calYear').textContent = year;
  buildCalGrid(document.getElementById('calGrid'), document.getElementById('calGridHeader'), year, month, selectedDate, (d) => { selectedDate = d; renderCalendar(); renderSlots(); });
}
document.getElementById('prevMonth').onclick = () => { currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth()-1,1); renderCalendar(); };
document.getElementById('nextMonth').onclick = () => { currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth()+1,1); renderCalendar(); };

function renderSlots() {
  document.getElementById('dateLabel').textContent = formatDateFR(selectedDate);
  const slots = DAY_SLOTS[selectedDate.getDay()] || [];
  const container = document.getElementById('slotsContainer');
  container.innerHTML = '';
  if(!slots.length){ container.innerHTML=`<div class="no-slots"><p>Aucun cours ce jour-là.</p></div>`; return; }
  slots.forEach(({label,key})=>{
    const students = data[key]||[];
    const count = students.length, full = count>=MAX, pct = Math.round(count/MAX*100);
    const card = document.createElement('div');
    card.className = 'slot-card'+(full?' full':'');
    card.innerHTML = `<div style="flex:1;"><p class="slot-time">${label}</p><p class="slot-count">${count}/${MAX} places</p><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div></div>`;
    const btn = document.createElement('button');
    btn.className='reserve-btn';
    btn.disabled = full||bookingSlot===key;
    btn.innerHTML = bookingSlot===key?'<span class="spinner" style="width:12px;height:12px;"></span>':(full?'Complet':'Réserver');
    btn.onclick=()=>reserve(key,label);
    card.appendChild(btn); container.appendChild(card);
  });
}

async function reserve(key, label){
  const name = document.getElementById('nameInput').value.trim();
  const subject = document.getElementById('subjectSelect').value;
  if(!name || !subject){ alert("Veuillez remplir tous les champs."); return; }
  const students = data[key] || [];
  bookingSlot = key; renderSlots();
  try {
    await slotsRef.child(key).set([...students, {name, subject}]);
    bookingSlot = null;
    const msg = encodeURIComponent(`Nouvelle réservation\nNom : ${name}\nMatière : ${subject}\nCréneau : ${key}\nDate : ${formatDateFR(selectedDate)}`);
    window.location.href = `sms:0619336183?body=${msg}`;
  } catch(err) { bookingSlot = null; renderSlots(); alert("Erreur."); }
}

document.getElementById('adminBtn').onclick = () => {
  const pass = prompt('Mot de passe prof');
  if(pass === ADMIN_PASSWORD){ isAdmin = true; document.getElementById('adminPanel').style.display = 'block'; renderAdminPanel(); }
};

function renderAdminPanel() {
  const panel = document.getElementById('adminPanel');
  panel.innerHTML = `<div class="admin-panel"><div class="admin-header"><div class="admin-title">Espace Professeur</div></div><div class="admin-layout"><div class="admin-cal-col"><div class="admin-glass-cal"><div class="cal-month-row"><div><span id="adminCalMonth"></span> <span id="adminCalYear"></span></div><div class="cal-nav"><button class="cal-nav-btn" id="adminPrev">&#8249;</button><button class="cal-nav-btn" id="adminNext">&#8250;</button></div></div><div class="cal-grid-header" id="adminGridHeader"></div><div class="cal-grid" id="adminGrid"></div></div></div><div class="admin-detail-col" id="adminDetailCol" style="flex:1;"></div></div></div>`;
  document.getElementById('adminPrev').onclick = () => { adminCurrentMonth=new Date(adminCurrentMonth.getFullYear(),adminCurrentMonth.getMonth()-1,1); renderAdminCal(); renderAdminDetail(); };
  document.getElementById('adminNext').onclick = () => { adminCurrentMonth=new Date(adminCurrentMonth.getFullYear(),adminCurrentMonth.getMonth()+1,1); renderAdminCal(); renderAdminDetail(); };
  renderAdminCal(); renderAdminDetail();
}

function renderAdminCal() {
  buildCalGrid(document.getElementById('adminGrid'), document.getElementById('adminGridHeader'), adminCurrentMonth.getFullYear(), adminCurrentMonth.getMonth(), adminSelectedDate, (d) => { adminSelectedDate=d; renderAdminCal(); renderAdminDetail(); }, {admin:true, showDots:true});
  document.getElementById('adminCalMonth').textContent = FR_MONTHS[adminCurrentMonth.getMonth()];
  document.getElementById('adminCalYear').textContent = adminCurrentMonth.getFullYear();
}

function renderAdminDetail() {
  const col = document.getElementById('adminDetailCol');
  const slots = DAY_SLOTS[adminSelectedDate.getDay()]||[];
  col.innerHTML = `<div style="margin-bottom:15px; font-weight:700;">${formatDateFR(adminSelectedDate)}</div>`;
  slots.forEach(({label,key})=>{
    const students = data[key]||[];
    const block = document.createElement('div');
    block.className = 'admin-slot-block';
    let rows = students.length===0 ? '<div style="font-size:12px; color:var(--muted); font-style:italic;">Aucun élève</div>' : students.map((s,i)=>`<div class="student-row"><div><b>${s.name}</b> <span style="font-size:11px; color:var(--accent);">(${s.subject})</span></div><button class="remove-btn" onclick="removeStudent('${key}',${i})">Suppr</button></div>`).join('');
    block.innerHTML=`<div class="admin-slot-title"><span>${label}</span> <span class="admin-slot-badge ${students.length>0?'has-p':''}">${students.length}/${MAX}</span></div>${rows}`;
    col.appendChild(block);
  });
}

async function removeStudent(slotKey, index){
  if(!confirm('Supprimer ?')) return;
  const newList = [...(data[slotKey]||[])];
  newList.splice(index, 1);
  await slotsRef.child(slotKey).set(newList.length > 0 ? newList : null);
}
</script>
</body>
